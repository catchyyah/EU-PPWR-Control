services:
  - type: web
    name: eu-ppwr-control
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEWS_API_KEY
        sync: false
    autoDeploy: true
    buildFilter:
      paths:
        - src/**
        - app/**
        - lib/**
        - public/**
        - package.json
        - next.config.ts
